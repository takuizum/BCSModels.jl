name: Documentation

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:

# Cancel intermediate builds when a new push lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build & deploy documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Install docs dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}            # for pushing to gh-pages
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}        # optional SSH key for protected branches
        run: julia --project=docs docs/make.jl
